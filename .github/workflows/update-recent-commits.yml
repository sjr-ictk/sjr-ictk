name: Update activity (grass + stats)

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate grass SVG and README sections
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TRACK_REPOS: ${{ vars.TRACK_REPOS }}
          DAYS: ${{ vars.DAYS || '365' }}
          TIMEZONE: Asia/Seoul
        run: node .github/scripts/generate-activity.mjs

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update work grass and activity stats"
          file_pattern: README.md assets/*
